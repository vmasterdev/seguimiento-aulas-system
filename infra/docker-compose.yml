services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: seguimiento
      POSTGRES_PASSWORD: seguimiento
      POSTGRES_DB: seguimiento
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

volumes:
  pgdata:
